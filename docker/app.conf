# Serve the application's public/ directory under the /door-showroom URL prefix,
# matching the path baked into the app's routes, asset URLs and links.
Alias /door-showroom /var/www/html/public

<Directory /var/www/html/public>
    Options -Indexes -MultiViews
    AllowOverride All
    Require all granted
</Directory>

# Land visitors who hit the bare domain root on the actual site.
RedirectMatch ^/$ /door-showroom
